syntax = "proto3";

package game_backend.proto;

message RequestContext {
  string trace_id = 1;
  uint64 request_id = 2;
  string auth_token = 3;
  int64 player_id = 4;
  int64 account_id = 5;
  int64 gateway_timestamp_ms = 6;
  string gateway_signature = 7;
}

message ResponseContext {
  string trace_id = 1;
  uint64 request_id = 2;
  string auth_token = 3;
  int64 player_id = 4;
  int64 account_id = 5;
}

message PingRequest {
  RequestContext context = 1;
  string message = 2;
}

message PingResponse {
  ResponseContext context = 1;
  string message = 2;
}

message ErrorResponse {
  ResponseContext context = 1;
  int32 error_code = 2;
  string error_name = 3;
  string error_message = 4;
}

message PlayerDungeonProgress {
  int32 dungeon_id = 1;
  int32 best_star = 2;
  bool is_first_clear = 3;
}

message PlayerProfile {
  int64 player_id = 1;
  int64 account_id = 2;
  string player_name = 3;
  int32 level = 4;
  int32 stamina = 5;
  int64 gold = 6;
  int64 diamond = 7;
  int32 server_id = 8;
  string nickname = 9;
  int32 main_progress = 10;
  int64 fight_power = 11;
}

message CurrencyBalance {
  string currency_type = 1;
  int64 amount = 2;
}

message RoleSummary {
  int32 role_id = 1;
  int32 level = 2;
  int32 star = 3;
}

message PlayerState {
  PlayerProfile profile = 1;
  repeated PlayerDungeonProgress dungeon_progress = 2;
  repeated CurrencyBalance currencies = 3;
  repeated RoleSummary role_summaries = 4;
}

message Reward {
  string reward_type = 1;
  int64 amount = 2;
}

message LoginRequest {
  RequestContext context = 1;
  string account_name = 2;
  string password = 3;
}

message LoginResponse {
  ResponseContext context = 1;
  reserved 2 to 5;
  string auth_token = 6;
  int64 account_id = 7;
  int64 player_id = 8;
  int64 expires_at_epoch_seconds = 9;
}

message LoadPlayerRequest {
  RequestContext context = 1;
  int64 player_id = 2;
}

message LoadPlayerResponse {
  ResponseContext context = 1;
  reserved 2 to 5;
  PlayerState player_state = 6;
  bool loaded_from_cache = 7;
}

message EnterBattleRequest {
  RequestContext context = 1;
  int64 player_id = 2;
  int32 stage_id = 3;
  string mode = 4;
  int32 loadout_id = 5;
}

message EnterBattleResponse {
  ResponseContext context = 1;
  reserved 2 to 5;
  int64 session_id = 6;
  int32 remain_stamina = 7;
  int64 seed = 8;
}

message SettleBattleRequest {
  RequestContext context = 1;
  int64 player_id = 2;
  int64 session_id = 3;
  int32 stage_id = 4;
  int32 star = 5;
  int32 result_code = 6;
  int64 client_score = 7;
}

message SettleBattleResponse {
  ResponseContext context = 1;
  reserved 2 to 5;
  int64 reward_grant_id = 6;
  int32 grant_status = 7;
  repeated Reward reward_preview = 8;
}

message GetRewardGrantStatusRequest {
  RequestContext context = 1;
  int64 player_id = 2;
  int64 reward_grant_id = 3;
}

message GetRewardGrantStatusResponse {
  ResponseContext context = 1;
  int64 reward_grant_id = 2;
  int32 grant_status = 3;
  repeated Reward granted_rewards = 4;
}

message EnterDungeonRequest {
  RequestContext context = 1;
  int64 player_id = 2;
  int32 dungeon_id = 3;
}

message EnterDungeonResponse {
  ResponseContext context = 1;
  reserved 2 to 5;
  string battle_id = 6;
  int32 remain_stamina = 7;
}

message SettleDungeonRequest {
  RequestContext context = 1;
  int64 player_id = 2;
  string battle_id = 3;
  int32 dungeon_id = 4;
  int32 star = 5;
  bool result = 6;
}

message SettleDungeonResponse {
  ResponseContext context = 1;
  reserved 2 to 5;
  bool first_clear = 6;
  repeated Reward rewards = 7;
}
