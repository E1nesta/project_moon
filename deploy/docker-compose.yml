x-backend-service: &backend-service
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: mobile_game_backend:local
  restart: unless-stopped
  env_file:
    - ./.env.demo

services:
  battle_schema_migrator:
    image: mysql:8.0
    restart: "no"
    env_file:
      - ./.env.demo
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    entrypoint: ["sh", "-lc"]
    command:
      - mysql -hmysql -uroot -p"$MYSQL_ROOT_PASSWORD" < /docker-entrypoint-initdb.d/003_commercial_game_schema.sql

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./.env.demo
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_demo_v5:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    restart: unless-stopped
    env_file:
      - ./.env.demo
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  login_server:
    <<: *backend-service
    command: ["./login_server", "--config", "configs/demo/login_server.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/demo/login_server.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  player_server:
    <<: *backend-service
    command: ["./player_server", "--config", "configs/demo/player_server.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/demo/player_server.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  player_internal_grpc_server:
    <<: *backend-service
    command: ["./player_internal_grpc_server", "--config", "configs/demo/player_internal_grpc_server.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 ${PLAYER_INTERNAL_GRPC_PORT:-7400}"]
      interval: 5s
      timeout: 3s
      retries: 20

  battle_server:
    <<: *backend-service
    command: ["./battle_server", "--config", "configs/demo/battle_server.conf"]
    depends_on:
      battle_schema_migrator:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      player_internal_grpc_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/demo/battle_server.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway_1:
    <<: *backend-service
    command: ["./gateway_server", "--config", "configs/demo/gateway_server_1.conf"]
    depends_on:
      redis:
        condition: service_healthy
      login_server:
        condition: service_healthy
      player_server:
        condition: service_healthy
      battle_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/demo/gateway_server_1.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway_2:
    <<: *backend-service
    command: ["./gateway_server", "--config", "configs/demo/gateway_server_2.conf"]
    depends_on:
      redis:
        condition: service_healthy
      login_server:
        condition: service_healthy
      player_server:
        condition: service_healthy
      battle_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/demo/gateway_server_2.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    env_file:
      - ./.env.demo
    ports:
      - "7000:7000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway_1:
        condition: service_healthy
      gateway_2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data_demo_v5:
