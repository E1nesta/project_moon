x-backend-service: &backend-service
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: mobile_game_backend:local
  restart: unless-stopped

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: game_backend
      MYSQL_USER: game
      MYSQL_PASSWORD: gamepass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_demo_v4:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  login_server:
    <<: *backend-service
    command: ["./login_server", "--config", "configs/login_server.docker.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7100"]
      interval: 5s
      timeout: 3s
      retries: 20

  game_server:
    <<: *backend-service
    command: ["./game_server", "--config", "configs/game_server.docker.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7200"]
      interval: 5s
      timeout: 3s
      retries: 20

  dungeon_server:
    <<: *backend-service
    command: ["./dungeon_server", "--config", "configs/dungeon_server.docker.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7300"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway_1:
    <<: *backend-service
    command: ["./gateway", "--config", "configs/gateway_1.conf"]
    depends_on:
      redis:
        condition: service_healthy
      login_server:
        condition: service_healthy
      game_server:
        condition: service_healthy
      dungeon_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7000"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway_2:
    <<: *backend-service
    command: ["./gateway", "--config", "configs/gateway_2.conf"]
    depends_on:
      redis:
        condition: service_healthy
      login_server:
        condition: service_healthy
      game_server:
        condition: service_healthy
      dungeon_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7000"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway_1:
        condition: service_healthy
      gateway_2:
        condition: service_healthy

volumes:
  mysql_data_demo_v4:
