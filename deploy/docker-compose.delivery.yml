x-backend-service: &backend-service
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: mobile_game_backend:local
  restart: unless-stopped
  env_file:
    - ./.env.delivery

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./.env.delivery
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data_delivery_v1:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    restart: unless-stopped
    env_file:
      - ./.env.delivery
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  login_server:
    <<: *backend-service
    command: ["./login_server", "--config", "configs/delivery/login_server.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/delivery/login_server.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  game_server:
    <<: *backend-service
    command: ["./game_server", "--config", "configs/delivery/game_server.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/delivery/game_server.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  dungeon_server:
    <<: *backend-service
    command: ["./dungeon_server", "--config", "configs/delivery/dungeon_server.conf"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/delivery/dungeon_server.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway_1:
    <<: *backend-service
    command: ["./gateway", "--config", "configs/delivery/gateway_1.conf"]
    depends_on:
      redis:
        condition: service_healthy
      login_server:
        condition: service_healthy
      game_server:
        condition: service_healthy
      dungeon_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/delivery/gateway_1.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway_2:
    <<: *backend-service
    command: ["./gateway", "--config", "configs/delivery/gateway_2.conf"]
    depends_on:
      redis:
        condition: service_healthy
      login_server:
        condition: service_healthy
      game_server:
        condition: service_healthy
      dungeon_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "./service_check", "--config", "configs/delivery/gateway_2.conf", "--mode", "ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/tls:/etc/nginx/tls:ro
    depends_on:
      gateway_1:
        condition: service_healthy
      gateway_2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data_delivery_v1:
