# Backward-compatible local login config
service.name=login_server
host=0.0.0.0
port=${LOGIN_PORT:-7100}
heartbeat_interval_ms=5000
log.level=info
mysql.host=${MYSQL_HOST:-127.0.0.1}
mysql.port=${MYSQL_PORT:-3307}
mysql.user=${MYSQL_USER:-game}
mysql.password=${MYSQL_PASSWORD:-gamepass}
mysql.database=${MYSQL_DATABASE:-game_backend}
redis.host=${REDIS_HOST:-127.0.0.1}
redis.port=${REDIS_PORT:-6379}
redis.password=${REDIS_PASSWORD:-}
ttl.session_seconds=${SESSION_TTL_SECONDS:-3600}
demo.account_id=${DEMO_ACCOUNT_ID:-10001}
demo.account_name=${DEMO_ACCOUNT_NAME:-demo}
demo.password_hash=${DEMO_PASSWORD_HASH:-pbkdf2_sha256$100000$737461727465722d64656d6f2d73616c74$6f24c15d816cb5760860dcdf75b60d557913253234b3e59620bc715c864c88e2}
demo.default_player_id=${DEMO_PLAYER_ID:-20001}
