# Docker player service config
service.name=player_server
service.listen.host=0.0.0.0
service.listen.port=${PLAYER_PORT:-7200}
runtime.shutdown_grace_ms=${RUNTIME_SHUTDOWN_GRACE_MS:-5000}
transport.io_threads=${TRANSPORT_IO_THREADS:-1}
transport.idle_timeout_ms=${TRANSPORT_IDLE_TIMEOUT_MS:-30000}
transport.write_queue_limit=${TRANSPORT_WRITE_QUEUE_LIMIT:-128}
log.level=info
storage.mysql.host=${MYSQL_HOST:-mysql}
storage.mysql.port=${MYSQL_PORT:-3306}
storage.mysql.user=${MYSQL_USER:-game}
storage.mysql.password=${MYSQL_PASSWORD:-gamepass}
storage.mysql.database=${MYSQL_DATABASE:-game_backend}
storage.redis.host=${REDIS_HOST:-redis}
storage.redis.port=${REDIS_PORT:-6379}
storage.redis.password=${REDIS_PASSWORD:-}
storage.redis.timeout_ms=${REDIS_TIMEOUT_MS:-2000}
storage.session.ttl_seconds=${SESSION_TTL_SECONDS:-3600}
storage.player.snapshot_ttl_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
demo.account_id=${DEMO_ACCOUNT_ID:-10001}
demo.player_id=${DEMO_PLAYER_ID:-20001}
demo.player_name=${DEMO_PLAYER_NAME:-hero_demo}
demo.level=${DEMO_PLAYER_LEVEL:-10}
demo.stamina=${DEMO_PLAYER_STAMINA:-120}
demo.gold=${DEMO_PLAYER_GOLD:-1000}
demo.diamond=${DEMO_PLAYER_DIAMOND:-100}
