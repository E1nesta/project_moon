# Demo gateway 2 config
service.name=gateway_server
service.instance_id=gateway_2
runtime.environment=dev
service.listen.host=0.0.0.0
service.listen.port=${GATEWAY_PORT:-7000}
runtime.shutdown_grace_ms=${RUNTIME_SHUTDOWN_GRACE_MS:-5000}
transport.io_threads=${TRANSPORT_IO_THREADS:-1}
transport.idle_timeout_ms=${TRANSPORT_IDLE_TIMEOUT_MS:-30000}
transport.write_queue_limit=${TRANSPORT_WRITE_QUEUE_LIMIT:-128}
transport.max_packet_body_bytes=${TRANSPORT_MAX_PACKET_BODY_BYTES:-4194304}
transport.tls.enabled=${TRANSPORT_TLS_ENABLED:-false}
transport.tls.cert_file=${TRANSPORT_TLS_CERT_FILE:-}
transport.tls.key_file=${TRANSPORT_TLS_KEY_FILE:-}
transport.tls.ca_file=${TRANSPORT_TLS_CA_FILE:-}
transport.tls.verify_peer=${TRANSPORT_TLS_VERIFY_PEER:-false}
execution.worker_threads=${EXECUTION_WORKER_THREADS:-1}
execution.shard_count=${EXECUTION_SHARD_COUNT:-1}
execution.queue_limit=${EXECUTION_QUEUE_LIMIT:-1024}
security.trusted_gateway.shared_secret=${TRUSTED_GATEWAY_SHARED_SECRET:-demo-gateway-shared-secret}
security.trusted_gateway.max_clock_skew_ms=${TRUSTED_GATEWAY_MAX_CLOCK_SKEW_MS:-10000}
upstream.timeout_ms=${UPSTREAM_TIMEOUT_MS:-3000}
gateway.forward_workers=${GATEWAY_FORWARD_WORKERS:-4}
gateway.forward_queue_limit=${GATEWAY_FORWARD_QUEUE_LIMIT:-1024}
gateway.rate_limit.login_ip.limit=${GATEWAY_RATE_LIMIT_LOGIN_IP_LIMIT:-10}
gateway.rate_limit.login_ip.window_seconds=${GATEWAY_RATE_LIMIT_LOGIN_IP_WINDOW_SECONDS:-60}
gateway.rate_limit.login_account.limit=${GATEWAY_RATE_LIMIT_LOGIN_ACCOUNT_LIMIT:-20}
gateway.rate_limit.login_account.window_seconds=${GATEWAY_RATE_LIMIT_LOGIN_ACCOUNT_WINDOW_SECONDS:-60}
gateway.rate_limit.session.limit=${GATEWAY_RATE_LIMIT_SESSION_LIMIT:-60}
gateway.rate_limit.session.window_seconds=${GATEWAY_RATE_LIMIT_SESSION_WINDOW_SECONDS:-1}
gateway.rate_limit.ip_fallback.limit=${GATEWAY_RATE_LIMIT_IP_FALLBACK_LIMIT:-30}
gateway.rate_limit.ip_fallback.window_seconds=${GATEWAY_RATE_LIMIT_IP_FALLBACK_WINDOW_SECONDS:-1}
gateway.rate_limit.acquire_timeout_ms=${GATEWAY_RATE_LIMIT_ACQUIRE_TIMEOUT_MS:-100}
gateway.rate_limit.redis.pool_size=${GATEWAY_RATE_LIMIT_REDIS_POOL_SIZE:-4}
log.level=info
log.format=text
storage.redis.host=${REDIS_HOST:-redis}
storage.redis.port=${REDIS_PORT:-6379}
storage.redis.password=${REDIS_PASSWORD:-}
storage.redis.timeout_ms=${REDIS_TIMEOUT_MS:-2000}
storage.redis.pool_size=${REDIS_POOL_SIZE:-4}
storage.session.ttl_seconds=${SESSION_TTL_SECONDS:-3600}
client.host=${CLIENT_GATEWAY_HOST:-127.0.0.1}
client.timeout_ms=${CLIENT_TIMEOUT_MS:-3000}
upstream.pool_size=${UPSTREAM_POOL_SIZE:-2}
upstream.tls.enabled=${UPSTREAM_TLS_ENABLED:-false}
upstream.tls.cert_file=${UPSTREAM_TLS_CERT_FILE:-}
upstream.tls.key_file=${UPSTREAM_TLS_KEY_FILE:-}
upstream.tls.ca_file=${UPSTREAM_TLS_CA_FILE:-}
upstream.tls.server_name=${UPSTREAM_TLS_SERVER_NAME:-}
upstream.tls.verify_peer=${UPSTREAM_TLS_VERIFY_PEER:-false}
upstream.login.host=${LOGIN_UPSTREAM_HOST:-login_server}
upstream.login.port=${LOGIN_UPSTREAM_PORT:-7100}
upstream.player.host=${PLAYER_UPSTREAM_HOST:-player_server}
upstream.player.port=${PLAYER_UPSTREAM_PORT:-7200}
upstream.dungeon.host=${DUNGEON_UPSTREAM_HOST:-dungeon_server}
upstream.dungeon.port=${DUNGEON_UPSTREAM_PORT:-7300}
