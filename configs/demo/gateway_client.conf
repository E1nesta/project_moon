# Demo client-facing gateway config
service.name=gateway_client
runtime.environment=dev
host=0.0.0.0
port=${GATEWAY_PORT:-7000}
client.host=${CLIENT_GATEWAY_HOST:-127.0.0.1}
client.timeout_ms=${CLIENT_TIMEOUT_MS:-3000}
client.tls.enabled=${CLIENT_TLS_ENABLED:-false}
client.tls.cert_file=${CLIENT_TLS_CERT_FILE:-}
client.tls.key_file=${CLIENT_TLS_KEY_FILE:-}
client.tls.ca_file=${CLIENT_TLS_CA_FILE:-}
client.tls.server_name=${CLIENT_TLS_SERVER_NAME:-}
client.tls.verify_peer=${CLIENT_TLS_VERIFY_PEER:-false}
