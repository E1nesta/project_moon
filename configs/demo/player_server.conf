# Demo player service config
service.name=player_server
runtime.environment=dev
service.listen.host=0.0.0.0
service.listen.port=${PLAYER_PORT:-7200}
runtime.shutdown_grace_ms=${RUNTIME_SHUTDOWN_GRACE_MS:-5000}
transport.io_threads=${TRANSPORT_IO_THREADS:-1}
transport.idle_timeout_ms=${TRANSPORT_IDLE_TIMEOUT_MS:-30000}
transport.write_queue_limit=${TRANSPORT_WRITE_QUEUE_LIMIT:-128}
transport.max_packet_body_bytes=${TRANSPORT_MAX_PACKET_BODY_BYTES:-4194304}
transport.tls.enabled=${TRANSPORT_TLS_ENABLED:-false}
transport.tls.cert_file=${TRANSPORT_TLS_CERT_FILE:-}
transport.tls.key_file=${TRANSPORT_TLS_KEY_FILE:-}
transport.tls.ca_file=${TRANSPORT_TLS_CA_FILE:-}
transport.tls.verify_peer=${TRANSPORT_TLS_VERIFY_PEER:-false}
execution.worker_threads=${EXECUTION_WORKER_THREADS:-1}
execution.shard_count=${EXECUTION_SHARD_COUNT:-1}
execution.queue_limit=${EXECUTION_QUEUE_LIMIT:-1024}
security.trusted_gateway.shared_secret=${TRUSTED_GATEWAY_SHARED_SECRET:-demo-gateway-shared-secret}
security.trusted_gateway.max_clock_skew_ms=${TRUSTED_GATEWAY_MAX_CLOCK_SKEW_MS:-10000}
log.level=info
log.format=text
storage.player.mysql.host=${PLAYER_MYSQL_HOST:-mysql}
storage.player.mysql.port=${PLAYER_MYSQL_PORT:-3306}
storage.player.mysql.user=${PLAYER_MYSQL_USER:-game}
storage.player.mysql.password=${PLAYER_MYSQL_PASSWORD:-gamepass}
storage.player.mysql.database=${PLAYER_MYSQL_DATABASE:-player_db}
storage.player.mysql.pool_size=${PLAYER_MYSQL_POOL_SIZE:-4}
storage.player.redis.host=${PLAYER_REDIS_HOST:-redis}
storage.player.redis.port=${PLAYER_REDIS_PORT:-6379}
storage.player.redis.password=${PLAYER_REDIS_PASSWORD:-}
storage.player.redis.timeout_ms=${PLAYER_REDIS_TIMEOUT_MS:-2000}
storage.player.redis.pool_size=${PLAYER_REDIS_POOL_SIZE:-4}
storage.session.ttl_seconds=${SESSION_TTL_SECONDS:-3600}
storage.player.snapshot_ttl_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
demo.account_id=${DEMO_ACCOUNT_ID:-10001}
demo.player_id=${DEMO_PLAYER_ID:-20001}
demo.player_name=${DEMO_PLAYER_NAME:-hero_demo}
demo.level=${DEMO_PLAYER_LEVEL:-10}
demo.stamina=${DEMO_PLAYER_STAMINA:-120}
demo.gold=${DEMO_PLAYER_GOLD:-1000}
demo.diamond=${DEMO_PLAYER_DIAMOND:-100}
