# Backward-compatible demo game config
service.name=game_server
host=0.0.0.0
port=${GAME_PORT:-7200}
heartbeat_interval_ms=5000
log.level=info
mysql.host=${MYSQL_HOST:-mysql}
mysql.port=${MYSQL_PORT:-3306}
mysql.user=${MYSQL_USER:-game}
mysql.password=${MYSQL_PASSWORD:-gamepass}
mysql.database=${MYSQL_DATABASE:-game_backend}
redis.host=${REDIS_HOST:-redis}
redis.port=${REDIS_PORT:-6379}
redis.password=${REDIS_PASSWORD:-}
ttl.session_seconds=${SESSION_TTL_SECONDS:-3600}
ttl.player_snapshot_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
demo.account_id=${DEMO_ACCOUNT_ID:-10001}
demo.player_id=${DEMO_PLAYER_ID:-20001}
demo.player_name=${DEMO_PLAYER_NAME:-hero_demo}
demo.level=${DEMO_PLAYER_LEVEL:-10}
demo.stamina=${DEMO_PLAYER_STAMINA:-120}
demo.gold=${DEMO_PLAYER_GOLD:-1000}
demo.diamond=${DEMO_PLAYER_DIAMOND:-100}
