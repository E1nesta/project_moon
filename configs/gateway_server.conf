# Local gateway server config
service.name=gateway_server
service.instance_id=gateway-local
service.listen.host=0.0.0.0
service.listen.port=${GATEWAY_PORT:-7000}
runtime.shutdown_grace_ms=${RUNTIME_SHUTDOWN_GRACE_MS:-5000}
transport.io_threads=${TRANSPORT_IO_THREADS:-1}
transport.idle_timeout_ms=${TRANSPORT_IDLE_TIMEOUT_MS:-30000}
transport.write_queue_limit=${TRANSPORT_WRITE_QUEUE_LIMIT:-128}
transport.max_packet_body_bytes=${TRANSPORT_MAX_PACKET_BODY_BYTES:-4194304}
execution.worker_threads=${EXECUTION_WORKER_THREADS:-1}
execution.shard_count=${EXECUTION_SHARD_COUNT:-1}
execution.queue_limit=${EXECUTION_QUEUE_LIMIT:-1024}
upstream.timeout_ms=${UPSTREAM_TIMEOUT_MS:-3000}
gateway.forward_workers=${GATEWAY_FORWARD_WORKERS:-4}
gateway.forward_queue_limit=${GATEWAY_FORWARD_QUEUE_LIMIT:-1024}
log.level=info
storage.redis.host=${REDIS_HOST:-127.0.0.1}
storage.redis.port=${REDIS_PORT:-6379}
storage.redis.password=${REDIS_PASSWORD:-}
storage.redis.timeout_ms=${REDIS_TIMEOUT_MS:-2000}
storage.redis.pool_size=${REDIS_POOL_SIZE:-4}
storage.session.ttl_seconds=${SESSION_TTL_SECONDS:-3600}
client.host=${CLIENT_GATEWAY_HOST:-127.0.0.1}
client.timeout_ms=${CLIENT_TIMEOUT_MS:-3000}
upstream.pool_size=${UPSTREAM_POOL_SIZE:-2}
upstream.login.host=${LOGIN_UPSTREAM_HOST:-127.0.0.1}
upstream.login.port=${LOGIN_UPSTREAM_PORT:-7100}
upstream.player.host=${PLAYER_UPSTREAM_HOST:-127.0.0.1}
upstream.player.port=${PLAYER_UPSTREAM_PORT:-7200}
upstream.dungeon.host=${DUNGEON_UPSTREAM_HOST:-127.0.0.1}
upstream.dungeon.port=${DUNGEON_UPSTREAM_PORT:-7300}
