# Backward-compatible local gateway config
service.name=gateway
instance.id=gateway-local
host=0.0.0.0
port=${GATEWAY_PORT:-7000}
heartbeat_interval_ms=5000
log.level=info
redis.host=${REDIS_HOST:-127.0.0.1}
redis.port=${REDIS_PORT:-6379}
redis.password=${REDIS_PASSWORD:-}
ttl.session_seconds=${SESSION_TTL_SECONDS:-3600}
client.host=${CLIENT_GATEWAY_HOST:-127.0.0.1}
client.timeout_ms=${CLIENT_TIMEOUT_MS:-3000}
upstream.pool_size=${UPSTREAM_POOL_SIZE:-2}
upstream.timeout_ms=${UPSTREAM_TIMEOUT_MS:-3000}
login.upstream.host=${LOGIN_UPSTREAM_HOST:-127.0.0.1}
login.upstream.port=${LOGIN_UPSTREAM_PORT:-7100}
game.upstream.host=${GAME_UPSTREAM_HOST:-127.0.0.1}
game.upstream.port=${GAME_UPSTREAM_PORT:-7200}
dungeon.upstream.host=${DUNGEON_UPSTREAM_HOST:-127.0.0.1}
dungeon.upstream.port=${DUNGEON_UPSTREAM_PORT:-7300}
