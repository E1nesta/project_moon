# Delivery login service config
service.name=login_server
runtime.environment=staging
service.listen.host=0.0.0.0
service.listen.port=${LOGIN_PORT:-7100}
runtime.shutdown_grace_ms=${RUNTIME_SHUTDOWN_GRACE_MS:-5000}
transport.io_threads=${TRANSPORT_IO_THREADS:-1}
transport.idle_timeout_ms=${TRANSPORT_IDLE_TIMEOUT_MS:-30000}
transport.write_queue_limit=${TRANSPORT_WRITE_QUEUE_LIMIT:-128}
transport.max_packet_body_bytes=${TRANSPORT_MAX_PACKET_BODY_BYTES:-4194304}
transport.tls.enabled=${TRANSPORT_TLS_ENABLED:-true}
transport.tls.cert_file=${TRANSPORT_TLS_CERT_FILE:-/etc/game_backend/tls/login_server.crt}
transport.tls.key_file=${TRANSPORT_TLS_KEY_FILE:-/etc/game_backend/tls/login_server.key}
transport.tls.ca_file=${TRANSPORT_TLS_CA_FILE:-/etc/game_backend/tls/ca.pem}
transport.tls.verify_peer=${TRANSPORT_TLS_VERIFY_PEER:-false}
execution.worker_threads=${EXECUTION_WORKER_THREADS:-1}
execution.shard_count=${EXECUTION_SHARD_COUNT:-1}
execution.queue_limit=${EXECUTION_QUEUE_LIMIT:-1024}
security.trusted_gateway.shared_secret=${TRUSTED_GATEWAY_SHARED_SECRET:-}
security.trusted_gateway.max_clock_skew_ms=${TRUSTED_GATEWAY_MAX_CLOCK_SKEW_MS:-10000}
log.level=info
log.format=text
storage.account.mysql.host=${ACCOUNT_MYSQL_HOST:-mysql}
storage.account.mysql.port=${ACCOUNT_MYSQL_PORT:-3306}
storage.account.mysql.user=${ACCOUNT_MYSQL_USER:-game}
storage.account.mysql.password=${ACCOUNT_MYSQL_PASSWORD:-gamepass}
storage.account.mysql.database=${ACCOUNT_MYSQL_DATABASE:-account_db}
storage.account.mysql.pool_size=${ACCOUNT_MYSQL_POOL_SIZE:-4}
storage.player.mysql.host=${PLAYER_MYSQL_HOST:-mysql}
storage.player.mysql.port=${PLAYER_MYSQL_PORT:-3306}
storage.player.mysql.user=${PLAYER_MYSQL_USER:-game}
storage.player.mysql.password=${PLAYER_MYSQL_PASSWORD:-gamepass}
storage.player.mysql.database=${PLAYER_MYSQL_DATABASE:-player_db}
storage.player.mysql.pool_size=${PLAYER_MYSQL_POOL_SIZE:-4}
storage.account.redis.host=${ACCOUNT_REDIS_HOST:-redis}
storage.account.redis.port=${ACCOUNT_REDIS_PORT:-6379}
storage.account.redis.password=${ACCOUNT_REDIS_PASSWORD:-}
storage.account.redis.timeout_ms=${ACCOUNT_REDIS_TIMEOUT_MS:-2000}
storage.account.redis.pool_size=${ACCOUNT_REDIS_POOL_SIZE:-4}
storage.session.ttl_seconds=${SESSION_TTL_SECONDS:-3600}
