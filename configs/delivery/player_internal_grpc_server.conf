# Delivery player internal gRPC service config
service.name=player_internal_grpc_server
runtime.environment=staging
log.level=info
log.format=text
grpc.listen.host=0.0.0.0
grpc.listen.port=${PLAYER_INTERNAL_GRPC_PORT:-7400}
storage.player.mysql.host=${PLAYER_MYSQL_HOST:-mysql}
storage.player.mysql.port=${PLAYER_MYSQL_PORT:-3306}
storage.player.mysql.user=${PLAYER_MYSQL_USER:-game}
storage.player.mysql.password=${PLAYER_MYSQL_PASSWORD:-gamepass}
storage.player.mysql.database=${PLAYER_MYSQL_DATABASE:-player_db}
storage.player.mysql.pool_size=${PLAYER_MYSQL_POOL_SIZE:-4}
storage.player.redis.host=${PLAYER_REDIS_HOST:-redis}
storage.player.redis.port=${PLAYER_REDIS_PORT:-6379}
storage.player.redis.password=${PLAYER_REDIS_PASSWORD:-}
storage.player.redis.timeout_ms=${PLAYER_REDIS_TIMEOUT_MS:-2000}
storage.player.redis.pool_size=${PLAYER_REDIS_POOL_SIZE:-4}
storage.player.snapshot_ttl_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
