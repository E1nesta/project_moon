# Delivery dungeon service config
service.name=dungeon_server
runtime.environment=staging
service.listen.host=0.0.0.0
service.listen.port=${DUNGEON_PORT:-7300}
runtime.shutdown_grace_ms=${RUNTIME_SHUTDOWN_GRACE_MS:-5000}
transport.io_threads=${TRANSPORT_IO_THREADS:-1}
transport.idle_timeout_ms=${TRANSPORT_IDLE_TIMEOUT_MS:-30000}
transport.write_queue_limit=${TRANSPORT_WRITE_QUEUE_LIMIT:-128}
transport.max_packet_body_bytes=${TRANSPORT_MAX_PACKET_BODY_BYTES:-4194304}
transport.tls.enabled=${TRANSPORT_TLS_ENABLED:-true}
transport.tls.cert_file=${TRANSPORT_TLS_CERT_FILE:-/etc/game_backend/tls/dungeon_server.crt}
transport.tls.key_file=${TRANSPORT_TLS_KEY_FILE:-/etc/game_backend/tls/dungeon_server.key}
transport.tls.ca_file=${TRANSPORT_TLS_CA_FILE:-/etc/game_backend/tls/ca.pem}
transport.tls.verify_peer=${TRANSPORT_TLS_VERIFY_PEER:-false}
execution.worker_threads=${EXECUTION_WORKER_THREADS:-1}
execution.shard_count=${EXECUTION_SHARD_COUNT:-1}
execution.queue_limit=${EXECUTION_QUEUE_LIMIT:-1024}
security.trusted_gateway.shared_secret=${TRUSTED_GATEWAY_SHARED_SECRET:-}
security.trusted_gateway.max_clock_skew_ms=${TRUSTED_GATEWAY_MAX_CLOCK_SKEW_MS:-10000}
log.level=info
log.format=text
storage.mysql.host=${MYSQL_HOST:-mysql}
storage.mysql.port=${MYSQL_PORT:-3306}
storage.mysql.user=${MYSQL_USER:-game}
storage.mysql.password=${MYSQL_PASSWORD:-gamepass}
storage.mysql.database=${MYSQL_DATABASE:-game_backend}
storage.mysql.pool_size=${MYSQL_POOL_SIZE:-4}
storage.battle.mysql.host=${BATTLE_MYSQL_HOST:-mysql}
storage.battle.mysql.port=${BATTLE_MYSQL_PORT:-3306}
storage.battle.mysql.user=${BATTLE_MYSQL_USER:-game}
storage.battle.mysql.password=${BATTLE_MYSQL_PASSWORD:-gamepass}
storage.battle.mysql.database=${BATTLE_MYSQL_DATABASE:-battle_db}
storage.battle.mysql.pool_size=${BATTLE_MYSQL_POOL_SIZE:-4}
storage.redis.host=${REDIS_HOST:-redis}
storage.redis.port=${REDIS_PORT:-6379}
storage.redis.password=${REDIS_PASSWORD:-}
storage.redis.timeout_ms=${REDIS_TIMEOUT_MS:-2000}
storage.redis.pool_size=${REDIS_POOL_SIZE:-4}
storage.battle.redis.host=${BATTLE_REDIS_HOST:-redis}
storage.battle.redis.port=${BATTLE_REDIS_PORT:-6379}
storage.battle.redis.password=${BATTLE_REDIS_PASSWORD:-}
storage.battle.redis.timeout_ms=${BATTLE_REDIS_TIMEOUT_MS:-2000}
storage.battle.redis.pool_size=${BATTLE_REDIS_POOL_SIZE:-4}
grpc.client.player_internal.host=${PLAYER_INTERNAL_GRPC_HOST:-player_internal_grpc_server}
grpc.client.player_internal.port=${PLAYER_INTERNAL_GRPC_PORT:-7400}
storage.session.ttl_seconds=${SESSION_TTL_SECONDS:-3600}
storage.player.snapshot_ttl_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
storage.battle.context_ttl_seconds=${BATTLE_CONTEXT_TTL_SECONDS:-3600}
storage.player.lock_ttl_seconds=${PLAYER_LOCK_TTL_SECONDS:-10}
mq.rocketmq.enabled=${ROCKETMQ_ENABLED:-false}
mq.rocketmq.nameserver=${ROCKETMQ_NAMESERVER:-rocketmq_namesrv:9876}
mq.rocketmq.endpoints=${ROCKETMQ_ENDPOINTS:-rocketmq_proxy:8081}
mq.rocketmq.topic=${ROCKETMQ_TOPIC:-battle_settlement_v1}
mq.rocketmq.producer_group=${ROCKETMQ_PRODUCER_GROUP:-battle_outbox_publisher_v1}
mq.rocketmq.consumer_group=${ROCKETMQ_CONSUMER_GROUP:-battle_reward_worker_v1}
demo.dungeon_id=${DEMO_DUNGEON_ID:-1001}
demo.dungeon_required_level=${DEMO_DUNGEON_REQUIRED_LEVEL:-1}
demo.dungeon_cost_stamina=${DEMO_DUNGEON_COST_STAMINA:-10}
demo.dungeon_max_star=${DEMO_DUNGEON_MAX_STAR:-3}
demo.dungeon_normal_gold_reward=${DEMO_DUNGEON_GOLD_REWARD:-100}
demo.dungeon_first_clear_diamond_reward=${DEMO_DUNGEON_FIRST_CLEAR_DIAMOND_REWARD:-50}
