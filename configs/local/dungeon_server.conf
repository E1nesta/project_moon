# Local dungeon service config
service.name=dungeon_server
host=0.0.0.0
port=${DUNGEON_PORT:-7300}
heartbeat_interval_ms=5000
log.level=info
mysql.host=${MYSQL_HOST:-127.0.0.1}
mysql.port=${MYSQL_PORT:-3307}
mysql.user=${MYSQL_USER:-game}
mysql.password=${MYSQL_PASSWORD:-gamepass}
mysql.database=${MYSQL_DATABASE:-game_backend}
redis.host=${REDIS_HOST:-127.0.0.1}
redis.port=${REDIS_PORT:-6379}
redis.password=${REDIS_PASSWORD:-}
ttl.session_seconds=${SESSION_TTL_SECONDS:-3600}
ttl.player_snapshot_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
ttl.battle_context_seconds=${BATTLE_CONTEXT_TTL_SECONDS:-3600}
ttl.player_lock_seconds=${PLAYER_LOCK_TTL_SECONDS:-10}
demo.dungeon_id=${DEMO_DUNGEON_ID:-1001}
demo.dungeon_required_level=${DEMO_DUNGEON_REQUIRED_LEVEL:-1}
demo.dungeon_cost_stamina=${DEMO_DUNGEON_COST_STAMINA:-10}
demo.dungeon_max_star=${DEMO_DUNGEON_MAX_STAR:-3}
demo.dungeon_normal_gold_reward=${DEMO_DUNGEON_GOLD_REWARD:-100}
demo.dungeon_first_clear_diamond_reward=${DEMO_DUNGEON_FIRST_CLEAR_DIAMOND_REWARD:-50}
