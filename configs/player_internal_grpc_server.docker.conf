# Container player internal gRPC service config
service.name=player_internal_grpc_server
runtime.environment=dev
log.level=info
log.format=text
grpc.listen.host=0.0.0.0
grpc.listen.port=${PLAYER_INTERNAL_GRPC_PORT:-7400}
storage.mysql.host=${MYSQL_HOST:-mysql}
storage.mysql.port=${MYSQL_PORT:-3306}
storage.mysql.user=${MYSQL_USER:-game}
storage.mysql.password=${MYSQL_PASSWORD:-gamepass}
storage.mysql.database=${MYSQL_DATABASE:-game_backend}
storage.mysql.pool_size=${MYSQL_POOL_SIZE:-4}
storage.redis.host=${REDIS_HOST:-redis}
storage.redis.port=${REDIS_PORT:-6379}
storage.redis.password=${REDIS_PASSWORD:-}
storage.redis.timeout_ms=${REDIS_TIMEOUT_MS:-2000}
storage.redis.pool_size=${REDIS_POOL_SIZE:-4}
storage.player.snapshot_ttl_seconds=${PLAYER_SNAPSHOT_TTL_SECONDS:-300}
